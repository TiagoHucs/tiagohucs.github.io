<!DOCTYPE html>
<html lang="en">
<head>
  <title>Controle de Medicamentos</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="repository.js"></script>
  <script src="service.js"></script>
  <script src="util.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="row" >
            <div class="col-sm-12">
                <h1>Cadastrar medicamento</h1>
            </div>
        </div>
        <hr>
        <div class="row">
            <div class="col-sm-12">
                <div class="card form">
                    <div class="card-body">
                        <label for="medication-name">Nome do remédio</label>
                        <input id="medication-name" class="form-control"/><br>
                        <label for="medication-time">A cada quantas horas?</label>
                        <input id="medication-time" type="number" class="form-control"/>
                        <button type="button" class="btn btn-success" onclick="saveMedication()">Salvar</button>
                        <button type="button" class="btn btn-danger" onclick="goTo('index')">Voltar</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12">
               
            </div>
        </div>
    </div>

</body>
</html>
