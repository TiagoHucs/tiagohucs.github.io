<!DOCTYPE html>
<html lang="pt-br">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <!-- Incluindo o CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <div class="container mt-5">

      <div class="row">
        <div class="col">
          <h1 id="title"></h1>
        </div>
        <div class="col text-end">
          <h1 id="custo"></h1>
        </div>
      </div>
      <hr>


          <div class="mb-3">
            <label for="preco_custo">Adicionar material:</label>
            <div class="input-group">
              <select id="materiaisSelect" class="btn btn-dark form-control" required onchange="selecionarOpcao()">
                  <!-- A lista de materiais cadastrados será exibida aqui -->
              </select>
              <input type="number" step="0.01" min="0" class="form-control" id="quantidade" required>
              <input type="text" class="form-control" id="showMedida" value="Kilo" disabled>
            </div>
          </div>
          <div style="text-align: right;">
            <button class="btn btn-dark" onclick="addMaterial()">Cadastrar</button>
          </div>


      <div class="row mt-5">
        <div class="col-md-12">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="itemList">
              <!-- A lista de items cadastrados será exibida aqui -->
            </tbody>
          </table>
        </div>
      </div>
      <hr>
      <button class="btn btn-dark" onclick="Util.redirectHome()">Voltar</button>
    </div>

    <!-- Incluindo os scripts do Bootstrap e do jQuery (necessário para algumas funcionalidades do Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="editar_produto.js"></script>
    <script src="Repository.js"></script>
    <script src="Util.js"></script>
  </body>
</html>
