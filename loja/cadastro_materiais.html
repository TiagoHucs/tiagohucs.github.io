<!DOCTYPE html>
<html lang="pt-br">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <!-- Incluindo o CSS do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <div class="container mt-5">
      <h1>Cadastro de Materiais</h1>
      <hr>

      <form id="materiaisForm">
        <div class="mb-3 mt-3">
          <label for="nome">Nome:</label>
          <input type="text" class="form-control" id="nome" name="nome" required>
        </div>
        <div class="mb-3">
          <label for="preco_custo">Preço Custo (R$):</label>
          <div class="input-group">
            <input type="number" step="0.01" min="0" class="form-control" id="preco_custo" name="preco_custo" required>
            <select class="btn btn-primary form-control" id="unidade_medida" name="unidade_medida" required>
              <option value="Kilo">Kilo</option>
              <option value="Unidade">Unidade</option>
              <option value="Litro">Litro</option>
              <option value="Metro">Metro</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </form>


      <div class="row mt-5">
        <div class="col-md-12">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Preço Custo (R$)</th>
                <th>Unidade de Medida</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="materiaisList">
              <!-- A lista de materiais cadastrados será exibida aqui -->
            </tbody>
          </table>
        </div>
      </div>
      <hr>
      <button class="btn btn-primary" onclick="window.location.href = 'loja.html'">Voltar</button>
    </div>

    <!-- Incluindo os scripts do Bootstrap e do jQuery (necessário para algumas funcionalidades do Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="cadastro_materiais.js"></script>
    <script src="Repository.js"></script>

  </body>
</html>
